changelog:
  exclude:
    labels:
      - build
      - docs
      - tests
  categories:
    - title: Breaking Changes
      labels:
        - breaking change
    - title: New Features
      labels:
        - new component
        - enhancement
        - API change
    - title: Bug Fixes
      labels:
        - bug
    - title: Other Changes
      labels:
        - "*"
      exclude:
        labels:
          - dependency
          - refactor
          - performance
