name: AutoTriage (PRs)

on:
  pull_request_target:
    types: [opened, ready_for_review]

jobs:
  triage_pr:
    if: ${{ github.repository_owner == 'MudBlazor' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.MUDBOT_APP_ID }}
          private-key: ${{ secrets.MUDBOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6

      - name: AutoTriage - triage pull request
        uses: danielchalmers/AutoTriage@v3
        with:
          issues: ${{ github.event.pull_request.number }}
          prompt-path: .github/AutoTriage.prompt
          model-fast: "" # skip fast pass
          model-pro: gemini-3.1-pro-preview
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: triage-artifacts-pr-${{ github.event.pull_request.number }}
          path: |
            triage-db.json
            artifacts/
