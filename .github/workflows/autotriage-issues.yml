name: AutoTriage (Issues)

on:
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: autotriage-db
  cancel-in-progress: false

jobs:
  triage_issue:
    if: ${{ github.repository_owner == 'MudBlazor' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MUDBOT_APP_ID }}
          private-key: ${{ secrets.MUDBOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6

      - name: Cache triage DB
        id: cache-db
        uses: actions/cache@v5
        with:
          path: triage-db.json
          key: ${{ runner.os }}-triage-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-triage-db-

      - name: AutoTriage - triage issue
        uses: danielchalmers/AutoTriage@v3
        with:
          issues: ${{ github.event.issue.number }}
          prompt-path: .github/AutoTriage.prompt
          model-fast: "" # skip fast pass
          model-pro: gemini-3.1-pro-preview
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: triage-artifacts-issue-${{ github.event.issue.number }}
          path: |
            triage-db.json
            artifacts/
