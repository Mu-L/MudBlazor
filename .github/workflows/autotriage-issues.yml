name: AutoTriage (Issues)

on:
  issues:
    types: [opened]

jobs:
  triage_issue:
    if: ${{ github.repository_owner == 'MudBlazor' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.MUDBOT_APP_ID }}
          private-key: ${{ secrets.MUDBOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
      
      - name: AutoTriage - triage issue
        uses: danielchalmers/AutoTriage@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          prompt-path: .github/AutoTriage.prompt
          model-fast: '' # skip fast pass
          model-pro: gemini-3.1-pro-preview
          model-pro-temperature: 1.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: triage-artifacts-issue-${{ github.event.issue.number }}
          path: |
            triage-db.json
            artifacts/
