name: AutoTriage (Comments)

# Disabled due to Gemini API rate limits being lowered
on:
  issue_comment:
    types: [created]

jobs:
  triage_comment:
    if: false  # Disabled due to Gemini API rate limits
    # Original condition: ${{ github.event.sender.type != 'Bot' && github.repository_owner == 'MudBlazor' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.MUDBOT_APP_ID }}
          private-key: ${{ secrets.MUDBOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
      
      - name: AutoTriage - triage comment
        uses: danielchalmers/AutoTriage@main
        with:
          issue-number: ${{ github.event.issue.number }}
          prompt-path: .github/AutoTriage.prompt
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: triage-artifacts-comment-${{ github.event.issue.number }}
          path: |
            triage-db.json
            artifacts/
