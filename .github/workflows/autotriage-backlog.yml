name: AutoTriage (Backlog)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      issues:
        description: "Space-separated issue numbers"
        type: string
        required: false
      dry-run:
        description: "Run in dry-run mode (true = no writes)"
        type: boolean
        required: false
        default: true
      max-fast-runs:
        description: "Max number of runs"
        type: number
        required: false
        default: 20
      context-caching:
        description: "Enable context caching"
        type: boolean
        required: false
        default: true
      extended:
        description: "Enable extended analysis"
        type: boolean
        required: false
        default: true
      model-fast:
        description: "Fast model"
        type: string
        required: false
        default: gemini-3.1-flash-lite
      model-pro:
        description: "Pro model"
        type: string
        required: false
        default: gemini-3-flash-preview

permissions:
  contents: read

concurrency:
  group: autotriage-db
  cancel-in-progress: false

jobs:
  triage:
    if: ${{ github.repository_owner == 'MudBlazor' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MUDBOT_APP_ID }}
          private-key: ${{ secrets.MUDBOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6

      - name: Cache triage DB
        id: cache-db
        uses: actions/cache@v5
        with:
          path: triage-db.json
          key: ${{ runner.os }}-triage-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-triage-db-

      - name: AutoTriage - triage backlog
        uses: danielchalmers/AutoTriage@v3
        with:
          issues: ${{ github.event.inputs.issues }}
          prompt-path: .github/AutoTriage.prompt
          dry-run: ${{ github.event_name != 'schedule' && inputs['dry-run'] }}
          max-fast-runs: ${{ github.event_name == 'workflow_dispatch' && inputs['max-fast-runs'] || 20 }}
          context-caching: ${{ github.event_name == 'workflow_dispatch' && inputs['context-caching'] || true }}
          extended: ${{ github.event_name == 'workflow_dispatch' && inputs['extended'] || true }}
          model-fast: ${{ github.event_name == 'workflow_dispatch' && inputs['model-fast'] || 'gemini-3.1-flash-lite' }}
          model-pro: ${{ github.event_name == 'workflow_dispatch' && inputs['model-pro'] || 'gemini-3-flash-preview' }}
          db-path: triage-db.json
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: triage-artifacts-${{ github.run_number }}
          path: |
            triage-db.json
            artifacts/
