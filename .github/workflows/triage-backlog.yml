name: Triage Backlog

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      backlog-size:
        description: 'Number of issues to auto-discover'
        required: false
        default: '5'
        type: string
      issue-numbers:
        description: 'Or use issue numbers (space-separated)'
        required: false
        type: string
      permissions:
        description: 'Permissions (`none` for dry run)'
        required: false
        default: 'label, comment, close, edit'
        type: string

jobs:
  auto-triage:
    runs-on: ubuntu-latest
    # Safety switch: Scheduled runs require the AUTOTRIAGE_PERMISSIONS repo variable to be set.
    if: github.event_name == 'workflow_dispatch' || vars.AUTOTRIAGE_PERMISSIONS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@2 @actions/core @octokit/rest

      # Persist the processed issues database (triage-db.json) between runs.
      - name: Cache Triage Database
        uses: actions/cache@v4
        id: cache-db
        with:
          path: triage-db.json
          # Unique key forces a new cache save on each successful run.
          key: ${{ runner.os }}-triage-database-${{ github.run_id }}
          # Restore key prefix finds the latest available cache.
          restore-keys: |
            ${{ runner.os }}-triage-database-

      - name: Triage Issues
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTOTRIAGE_DB_PATH: ${{ github.workspace }}/triage-db.json
          # Use input for permissions, fallback to repo variable for scheduled runs.
          AUTOTRIAGE_PERMISSIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.permissions || vars.AUTOTRIAGE_PERMISSIONS }}
          # Use a fixed limit for scheduled runs, fallback to manual input.
          MAX_ISSUES: ${{ github.event_name == 'schedule' && 50 || inputs.backlog-size }}
        run: |
          # Process specified issues, or fetch from the backlog.
          if [ -n "${{ inputs.issue-numbers }}" ]; then
            echo "Processing specified issues: ${{ inputs.issue-numbers }}"
            issue_numbers="${{ inputs.issue-numbers }}"
            max_count=""
          else
            echo "Processing up to $MAX_ISSUES issues from the backlog"
            issue_numbers=$(gh issue list --state open --limit 9999 --search 'sort:updated-desc -label:enhancement -label:"on hold" -is:locked' --json number --jq '.[].number')
            max_count="$MAX_ISSUES"
          fi

          count=0
          for issue_number in $issue_numbers; do
            if [ -n "$max_count" ] && [ "$count" -ge "$max_count" ]; then
              break
            fi
            
            export GITHUB_ISSUE_NUMBER="$issue_number"

            # Handle script exit codes: 0=Success, 1=Fatal Error, 2=Skip Issue.
            if node .github/scripts/AutoTriage.js; then
              count=$((count + 1))
              if [ -n "$max_count" ]; then
                left=$((max_count - count))
                echo "⏭️ $(date '+%Y-%m-%d %H:%M:%S'): $left left"
              fi
              sleep 10 # Rate limit
            else
              exit_code=$?
              if [ "$exit_code" -eq 1 ]; then
                echo "❌ Fatal error on #${issue_number}"
                exit 1
              elif [ "$exit_code" -eq 2 ]; then
                # No-op for skippable issues.
                :
              else
                echo "❌ Unexpected error (code $exit_code) on #${issue_number}"
                exit "$exit_code"
              fi
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: triage-artifacts
          path: |
            triage-db.json
            artifacts/
