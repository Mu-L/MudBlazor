name: Triage Backlog

on:
  schedule:
    - cron: '0 6 * * *' # Gemini rates reset at 7.
  workflow_dispatch:
    inputs:
      backlog-size:
        description: 'Number of issues to analyze'
        required: false
        default: '5'
        type: string
      issue-numbers:
        description: 'Or use issue numbers (space-separated)'
        required: false
        type: string
      permissions:
        description: 'Permissions (`none` for dry run)'
        required: false
        default: 'label, comment, close, edit'
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  auto-triage:
    runs-on: ubuntu-latest
    # Safety: Scheduled runs require the AUTOTRIAGE_PERMISSIONS repo variable to be set.
    if: github.event_name == 'workflow_dispatch' || vars.AUTOTRIAGE_PERMISSIONS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@2 @actions/core @octokit/rest

      - name: Cache Triage Database
        uses: actions/cache@v4
        id: cache-db
        with:
          path: triage-db.json
          # Unique key forces a new cache save on each successful run.
          key: ${{ runner.os }}-triage-database-${{ github.run_id }}
          # Restore key prefix finds the latest available cache.
          restore-keys: |
            ${{ runner.os }}-triage-database-

      - name: Triage Issues
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTOTRIAGE_DB_PATH: ${{ !inputs.issue-numbers && format('{0}/triage-db.json', github.workspace) || '' }}
          AUTOTRIAGE_PERMISSIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.permissions || vars.AUTOTRIAGE_PERMISSIONS }}
          MAX_ISSUES: ${{ inputs.backlog-size || '90' }}
          ISSUE_NUMBERS: ${{ inputs.issue-numbers }}
        run: |
          node .github/scripts/AutoTriage.js

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: triage-artifacts
          path: |
            triage-db.json
            artifacts/
