name: Triage Backlog

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      backlog-size:
        description: 'Number of issues to auto-discover'
        required: false
        default: '5'
        type: string
      issue-numbers:
        description: 'Or use issue numbers (space-separated)'
        required: false
        type: string
      permissions:
        description: 'Permissions (`none` for dry run)'
        required: false
        default: 'label, comment, close, edit'
        type: string

jobs:
  auto-triage:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.AUTOTRIAGE_PERMISSIONS # Run manually or on a schedule if permissions are set up.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@2 @actions/core @octokit/rest

      - name: Cache triage database
        uses: actions/cache@v4
        id: cache-db
        with:
          path: triage-db.json
          # 1. The key is unique on every run, forcing a save on success.
          key: ${{ runner.os }}-triage-database-${{ github.run_id }}
          # 2. Restore-keys finds the most recent cache to use at the start.
          restore-keys: |
            ${{ runner.os }}-triage-database-

      - name: Triage Issues
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTOTRIAGE_PERMISSIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.permissions || vars.AUTOTRIAGE_PERMISSIONS }}
          AUTOTRIAGE_DB_PATH: ${{ github.workspace }}/triage-db.json
          MAX_ISSUES: ${{ github.event_name == 'schedule' && 50 || inputs.backlog-size }}
        run: |
          if [ -n "${{ inputs.issue-numbers }}" ]; then
            echo "Processing specified issues: ${{ inputs.issue-numbers }}"
            issue_numbers="${{ inputs.issue-numbers }}"
            max_count=""
          else
            echo "Processing up to $MAX_ISSUES issues from the backlog"
            issue_numbers=$(gh issue list --state open --limit 9999 --search 'sort:updated-desc -label:enhancement -label:"on hold"' --json number --jq '.[].number')
            max_count="$MAX_ISSUES"
          fi

          count=0
          for issue_number in $issue_numbers; do
            if [ -n "$max_count" ] && [ "$count" -ge "$max_count" ]; then
              break
            fi
            
            export GITHUB_ISSUE_NUMBER="$issue_number"

            # This structure tells the shell we are handling the exit code ourselves
            if node .github/scripts/AutoTriage.js; then
              # SUCCESS (exit code 0)
              count=$((count + 1))
              if [ -n "$max_count" ]; then
                left=$((max_count - count))
                echo "⏭️ $(date '+%Y-%m-%d %H:%M:%S'): $left left"
              fi
              sleep 10 # Rate limit
            else
              # FAILURE (exit code is non-zero)
              exit_code=$?
              if [ "$exit_code" -eq 1 ]; then
                # Fatal error, fail the entire workflow
                echo "❌ Fatal error while processing #${issue_number}"
                exit 1
              elif [ "$exit_code" -eq 2 ]; then
                # Skippable issue. Do nothing and let the loop continue.
                # The step will not be marked as failed.
                :
              else
                # Any other unexpected error
                echo "❌ Unexpected error (exit code $exit_code) for #${issue_number}"
                exit "$exit_code"
              fi
            fi
          done

      - name: Display database stats
        if: always()
        run: |
          if [ -f "triage-db.json" ]; then
            total_entries=$(jq 'length' triage-db.json)
            echo "Database now contains $total_entries triaged issues"
            echo "Most recent entries:"
            jq -r 'to_entries | sort_by(.value.lastTriaged) | reverse | .[0:5] | .[] | "  #\(.key): \(.value.lastTriaged)"' triage-db.json || echo "  No entries found"
          else
            echo "Database file not found"
          fi

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: triage-artifacts
          path: |
            triage-db.json
            artifacts/
